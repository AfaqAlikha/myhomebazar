<div class="app-container flex flex-col items-center justify-center min-h-[80vh] px-4 bg-[var(--color-background)]">
  <app-ui-card borderRadius="0.5rem" class="w-full max-w-xl">
    <h3 class="text-center text-xl font-semibold mb-2">Forgot Password</h3>
    <p class="text-center text-sm text-[var(--color-text-secondary)] mb-6">
      We will send a 6-digit OTP to your email.
    </p>

    @if (step === 1) {
      <form [formGroup]="emailForm" (ngSubmit)="sendOtp()" class="flex flex-col gap-4">
        <app-ui-input
          label="Email"
          type="email"
          placeholder="Enter your email"
          controlName="email"
        ></app-ui-input>

        <app-ui-button
          label="Send OTP"
          type="submit"
          variant="accent"
          [loading]="loading"
        ></app-ui-button>

        <a routerLink="/signin" class="text-center text-sm text-[var(--color-accent)]">Back to Login</a>
      </form>
    } @else {
      <form [formGroup]="resetForm" (ngSubmit)="resetPassword()" class="flex flex-col gap-4">
        <app-ui-input
          label="6-Digit OTP"
          type="text"
          placeholder="Enter OTP"
          controlName="otp"
        ></app-ui-input>

        <app-ui-password label="New Password" controlName="newPassword"></app-ui-password>
        <app-ui-password label="Confirm Password" controlName="confirmPassword"></app-ui-password>

        <app-ui-button
          label="Reset Password"
          type="submit"
          variant="accent"
          [loading]="loading"
        ></app-ui-button>

        <button type="button" class="text-sm text-[var(--color-accent)]" (click)="resendOtp()" [disabled]="loading">
          Resend OTP
        </button>
      </form>
    }
  </app-ui-card>
</div>
