<div class="container mx-auto px-4 py-8 max-w-xl">
  <app-ui-card borderRadius="12px">
    <h2 class="text-2xl font-bold mb-2 text-[var(--color-text)]">Change Password</h2>
    <p class="text-sm text-[var(--color-text-secondary)] mb-6">
      A 6-digit OTP will be sent to your registered email.
    </p>

    @if (!otpSent) {
      <app-ui-button
        label="Send OTP to Email"
        variant="accent"
        [loading]="loading"
        (clicked)="sendOtp()"
      ></app-ui-button>
    } @else {
      @if (userEmail) {
        <p class="text-sm text-green-600 mb-4">OTP sent to {{ userEmail }}</p>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-4">
        <app-ui-input label="6-Digit OTP" type="text" placeholder="000000" controlName="otp"></app-ui-input>
        <app-ui-password label="New Password" controlName="newPassword"></app-ui-password>
        <app-ui-password label="Confirm Password" controlName="confirmPassword"></app-ui-password>

        <app-ui-button label="Change Password" type="submit" variant="accent" [loading]="loading"></app-ui-button>

        <button type="button" class="text-sm text-[var(--color-accent)]" (click)="sendOtp()" [disabled]="loading">
          Resend OTP
        </button>
      </form>
    }

    <a routerLink="/my-acount" class="inline-block mt-4 text-sm text-[var(--color-accent)]">Back to Profile</a>
  </app-ui-card>
</div>
