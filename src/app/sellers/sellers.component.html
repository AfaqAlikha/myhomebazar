<div class="container mx-auto px-4 py-6">
  <h1 class="text-3xl font-bold mb-2 text-[var(--color-text)]">Our Sellers</h1>
  <p class="text-sm text-[var(--color-text-secondary)] mb-6">
    Browse seller stores, view their products, and place orders.
  </p>

  <div class="mb-6 max-w-md">
    <app-ui-search label="Search seller by name" (search)="onSearch($event)"></app-ui-search>
  </div>

  <app-location-filter
    [initial]="locationFilters"
    (filterChange)="onLocationFilter($event)"
  ></app-location-filter>

  <div *ngIf="loading" class="text-center py-20 text-[var(--color-text-secondary)]">
    Loading sellers...
  </div>

  <div
    *ngIf="!loading && sellers.length === 0"
    class="text-center py-20 text-[var(--color-text-secondary)]"
  >
    No sellers found. Try different filters or search.
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" *ngIf="sellers.length">
    <app-ui-card *ngFor="let seller of sellers" borderRadius="12px">
      <a [routerLink]="['/profile', seller._id]" class="block text-center p-2">
        <div
          class="w-20 h-20 mx-auto bg-[var(--color-accent)] rounded-full flex items-center justify-center text-white text-2xl font-bold mb-3"
        >
          {{ getInitial(seller.name) }}
        </div>
        <h3 class="text-lg font-semibold text-[var(--color-text)] mb-1">{{ seller.name }}</h3>
        <p *ngIf="getLocation(seller)" class="text-xs text-[var(--color-text-secondary)] mb-2">
          📍 {{ getLocation(seller) }}
        </p>
        <p *ngIf="seller.bio" class="text-sm text-[var(--color-text-secondary)] line-clamp-2 mb-2">
          {{ seller.bio }}
        </p>
        <app-star-rating [value]="seller.rating || 0" [readonly]="true" size="sm"></app-star-rating>
        <span
          *ngFor="let badge of seller.badges"
          class="inline-block mt-2 mr-1 px-2 py-0.5 text-xs rounded-full bg-green-100 text-green-700"
        >
          {{ badge }}
        </span>
        <p class="mt-3 text-sm text-[var(--color-accent)] font-medium">View Store →</p>
      </a>
    </app-ui-card>
  </div>

  <div class="flex justify-end mt-8" *ngIf="totalItems > itemsPerPage">
    <mat-paginator
      [length]="totalItems"
      [pageSize]="itemsPerPage"
      [pageSizeOptions]="[12, 24]"
      [pageIndex]="currentPage - 1"
      (page)="pageChanged($event)"
    ></mat-paginator>
  </div>
</div>
