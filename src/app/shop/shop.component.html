<div class="container mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 mt-6 min-h-screen py-4 px-4 sm:px-6 md:px-10">
  <!-- Left: category filters -->
  <aside class="lg:col-span-3 order-2 lg:order-1">
    <app-ui-card [borderRadius]="borderRadius" class="mt-4 lg:mt-0 h-[400px] lg:h-[500px] overflow-y-auto">
      <h2 class="text-lg font-semibold mb-3">Categories</h2>
      <div class="flex flex-wrap gap-4">
        <div class="flex items-center gap-2">
          <input
            type="checkbox"
            class="w-4 h-4 accent-yellow-500 cursor-pointer"
            [checked]="!selectedCategoryId"
            (change)="showAllProducts()"
          />

          <label
            class="cursor-pointer"
            [ngClass]="{ 'text-[var(--color-accent)] font-semibold': !selectedCategoryId }"
            (click)="showAllProducts()"
          >
            See All Products
          </label>
        </div>

        <div *ngFor="let cat of categories" class="flex items-center gap-2">
          <input
            class="w-4 h-4 accent-yellow-500 cursor-pointer"
            type="checkbox"
            [checked]="selectedCategoryId === cat._id"
            (change)="selectCategory(cat)"
          />

          <label class="cursor-pointer" (click)="selectCategory(cat)">
            {{ cat.name }}
          </label>
        </div>
      </div>

      <div *ngIf="selectedCategoryId && subCategories.length > 0" class="mt-6">
        <h3 class="text-md font-semibold mb-2">Sub Categories</h3>
        <div class="flex flex-wrap gap-4">
          <div *ngFor="let sub of subCategories" class="flex items-center gap-2 py-2">
            <input
              class="w-4 h-4 accent-yellow-500 cursor-pointer"
              type="checkbox"
              [checked]="selectedSubCategoryId === sub._id"
              (change)="selectSubCategory(sub)"
            />

            <label class="cursor-pointer" (click)="selectSubCategory(sub)">
              {{ sub.subCategory }}
            </label>
          </div>
        </div>
      </div>

      <div *ngIf="selectedSubCategoryId && childSubCategories.length > 0" class="mt-6">
        <h3 class="font-semibold mt-5 mb-2">Child Categories</h3>

        <div class="flex flex-wrap gap-4">
          <div *ngFor="let child of childSubCategories" class="flex items-center gap-2">
            <input
              class="w-4 h-4 accent-yellow-500 cursor-pointer"
              type="checkbox"
              [checked]="selectedChildSubCategories.includes(child._id)"
              (change)="toggleChildSubCategory(child._id)"
            />

            <label>{{ child.childSubCategory }}</label>
          </div>
        </div>
      </div>
    </app-ui-card>
  </aside>

  <!-- Center: products -->
  <section class="lg:col-span-6 flex flex-col order-1 lg:order-2 min-w-0">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6 px-1">
      <div class="w-full md:w-auto">
        <app-ui-search (search)="onSearch($event)"></app-ui-search>
      </div>

      <div class="flex justify-start md:justify-end gap-3">
        <button
          class="px-4 py-2 border rounded-md"
          [ngClass]="{ 'bg-[var(--color-accent)]': sortOrder === 'low' }"
          (click)="setSort('low')"
        >
          Low to High
        </button>

        <button
          class="px-4 py-2 border rounded-md"
          [ngClass]="{ 'bg-[var(--color-accent)]': sortOrder === 'high' }"
          (click)="setSort('high')"
        >
          High to Low
        </button>
      </div>
    </div>

    <ngx-spinner bdColor="rgba(51,51,51,0.8)" size="medium" color="#fff" type="ball-scale-multiple">
    </ngx-spinner>

    <div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4 flex-grow">
      <div
        *ngIf="!noProducts && products.length === 0"
        class="col-span-full text-center text-gray-500 font-medium py-10"
      >
        Loading products...
      </div>

      <div *ngIf="noProducts" class="col-span-full text-center text-gray-500 font-medium py-10">
        No products found
      </div>

      <app-product-card *ngFor="let product of products" [product]="product"></app-product-card>
    </div>

    <div class="flex justify-center md:justify-end mt-6">
      <mat-paginator
        [length]="totalItems"
        [pageSize]="itemsPerPage"
        [pageSizeOptions]="[itemsPerPage]"
        [pageIndex]="currentPage - 1"
        (page)="pageChanged($event)"
      >
      </mat-paginator>
    </div>
  </section>

  <!-- Right: vertical ad (horizontal on mobile) -->
  <aside class="lg:col-span-3 order-3 lg:order-3 flex lg:justify-end">
    <app-google-ad
      variant="vertical"
      [responsiveRail]="true"
      layoutClass="google-ad-wrap--catalog-rail w-full lg:w-auto"
    ></app-google-ad>
  </aside>
</div>
