<div class="location-filter bg-[var(--color-card)] border border-[var(--color-border)] rounded-xl p-4 mb-6">
  <p class="text-sm font-semibold mb-3 text-[var(--color-text)]">Filter by Location</p>
  <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
    <div>
      <label class="block text-xs mb-1 text-[var(--color-text-secondary)]">Country</label>
      <select
        [(ngModel)]="country"
        class="w-full border border-[var(--color-border)] rounded-lg p-2 bg-[var(--color-background)] text-[var(--color-text)]"
      >
        <option value="">All Countries</option>
        <option *ngFor="let c of countries" [value]="c">{{ c }}</option>
      </select>
    </div>
    <div>
      <label class="block text-xs mb-1 text-[var(--color-text-secondary)]">State</label>
      <select
        [(ngModel)]="state"
        class="w-full border border-[var(--color-border)] rounded-lg p-2 bg-[var(--color-background)] text-[var(--color-text)]"
      >
        <option value="">All States</option>
        <option *ngFor="let s of states" [value]="s">{{ s }}</option>
      </select>
    </div>
    <div>
      <label class="block text-xs mb-1 text-[var(--color-text-secondary)]">City</label>
      <select
        [(ngModel)]="city"
        class="w-full border border-[var(--color-border)] rounded-lg p-2 bg-[var(--color-background)] text-[var(--color-text)]"
      >
        <option value="">All Cities</option>
        <option *ngFor="let c of cities" [value]="c">{{ c }}</option>
      </select>
    </div>
  </div>
  <div class="flex gap-3 mt-4 justify-end">
    <app-ui-button variant="danger" label="Reset" (clicked)="reset()"></app-ui-button>
    <app-ui-button variant="accent" label="Apply Filter" (clicked)="apply()"></app-ui-button>
  </div>
</div>
