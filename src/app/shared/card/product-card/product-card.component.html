<div
  class="relative flex flex-col items-center justify-center group w-full h-[350px] bg-[var(--color-card)] border border-[var(--color-border)] rounded-lg shadow-md p-3 transition-colors duration-300"
>
  <!-- Product Image -->
  <div class="relative overflow-hidden rounded-lg w-full h-52">
    <img
      [src]="product.images[0]"
      alt="Product Image"
      class="w-full h-full object-cover transform transition-transform duration-500 group-hover:scale-105"
    />

    <!-- Promoted badge -->
    <span
      *ngIf="isPromotionActive()"
      class="absolute top-2 left-2 z-10 px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wide bg-[var(--color-accent)] text-white shadow-md"
    >
      Promoted
    </span>

    <!-- Favorite & View Icons -->
    <div class="absolute top-2 right-2 flex flex-col gap-1">
      <button
        *ngIf="!isOwnProduct()"
        mat-icon-button
        class="!bg-[var(--color-accent)] !text-[var(--color-accent)] rounded-full p-1 shadow-md small-icon-btn"
        (click)="addToWishlist(product._id)"
      >
        <mat-icon class="text-[16px]">favorite</mat-icon>
      </button>

      <a
        [routerLink]="['/product/details', product._id]"
        mat-icon-button
        class="!bg-[var(--color-accent)] !text-[var(--color-accent)] rounded-full p-1 shadow-md small-icon-btn"
      >
        <mat-icon class="text-[16px]">visibility</mat-icon>
      </a>
    </div>

    <!-- Add to Cart Button -->
    <button
      *ngIf="!isOwnProduct()"
      class="absolute bottom-0 left-0 w-full bg-[var(--color-accent)] text-white py-2 text-sm font-semibold opacity-0 group-hover:opacity-100 transition-opacity disabled:opacity-70"
      [disabled]="cartLoading"
      (click)="addToCart(product)"
    >
      <span *ngIf="!cartLoading">Add To Cart</span>
      <span *ngIf="cartLoading">Adding...</span>
    </button>

    <!-- Own product badge -->
    <span
      *ngIf="isOwnProduct()"
      class="absolute bottom-0 left-0 w-full bg-[var(--color-border)] text-[var(--color-text-secondary)] py-2 text-sm font-semibold text-center"
    >
      Your Product
    </span>
  </div>

  <!-- Product Info -->
  <div class="mt-3 w-full">
    <div class="flex items-center justify-between">
      <p class="font-medium text-sm text-[var(--color-text)] dark:text-[var(--color-text)]">
        {{
          product.name.split(" ").slice(0, 10).join(" ") +
            (product.name.split(" ").length > 10 ? "..." : "")
        }}
      </p>

    </div>

    <!-- Product Description -->
    <p class="text-[var(--color-text-secondary)] dark:text-[var(--color-text-secondary)] text-xs mt-1 line-clamp-2">
      {{ product.description }}
    </p>

    <!-- Final Price -->
    <p class="text-[var(--color-text-secondary)] dark:text-[var(--color-text-secondary)] text-sm mt-1">
      Rs {{ product.price | number:'1.0-0' }}
    </p>

    <!-- Rating -->
    <app-star-rating
      [value]="product.averageRating"
      [readonly]="true"
      size="sm"
    ></app-star-rating>
  </div>
</div>
