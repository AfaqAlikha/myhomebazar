<div
  class="swiper relative w-full h-[450px] md:h-[650px]"
  #swiper
  *ngIf="featured && featured.length"
>
  <div class="swiper-wrapper">
    <div class="swiper-slide relative w-full h-[450px] md:h-[650px]" *ngFor="let slide of featured">
      <!-- Background -->
      <img
        [src]="slide.bannerImage || slide.images?.[0]"
        class="absolute inset-0 w-full h-full object-cover"
        alt="{{ slide.name }}"
      />

      <!-- Overlay -->
      <!-- <div
        class="absolute inset-0 bg-gradient-to-r from-black/80 via-black/40 to-transparent"
      ></div> -->
      <div
        *ngIf="slide.bannerType === 'product'"
        class="absolute inset-0 bg-gradient-to-r from-black/80 via-black/40 to-transparent"
      ></div>

      <!-- Content -->
      <div
        *ngIf="slide.bannerType === 'product'"
        class="absolute top-10 md:top-24 left-5 md:left-16 max-w-xl text-white z-10"
      >
        <span class="uppercase tracking-widest text-[var(--color-accent)] text-sm">
          {{ slide.catName }}
        </span>

        <h2 class="text-4xl md:text-6xl font-bold mt-3">
          {{ slide.name }}
        </h2>

        <p class="mt-5 text-lg text-gray-200">
          {{ slide.description }}
        </p>

        <div class="flex items-center gap-4 mt-5 flex-wrap">
          <h3 class="text-3xl md:text-5xl font-bold text-[var(--color-accent)]">
            Rs {{ slide.discountPrice || slide.price }}
          </h3>

          <span
            *ngIf="slide.promotion?.isActive"
            class="bg-green-500 px-3 py-1 rounded-full text-white text-sm"
          >
            Promotion
          </span>

          <span
            *ngIf="!slide.promotion?.isActive && slide.discountPrice"
            class="bg-red-500 px-3 py-1 rounded-full text-white text-sm"
          >
            {{ getDiscount(slide) }}% OFF
          </span>
        </div>

        <a
          [routerLink]="['/product/details', slide._id]"
          class="inline-block mt-8 px-8 py-3 rounded-full bg-[var(--color-accent)] text-white hover:scale-105 duration-300"
        >
          Shop Now →
        </a>
      </div>
    </div>
  </div>

  <!-- Navigation -->
  <div class="hero-prev swiper-button-prev"></div>
  <div class="hero-next swiper-button-next"></div>

  <!-- Pagination -->
  <div class="hero-pagination swiper-pagination"></div>
</div>
