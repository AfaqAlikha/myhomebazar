<div class="form-group w-full min-w-0">
  <label *ngIf="label" class="block text-sm font-medium mb-1">{{ label }}</label>
  <textarea
    *ngIf="rows; else singleLineInput"
    [placeholder]="placeholder"
    [formControlName]="controlName"
    [disabled]="disabled"
    [rows]="rows"
    class="form-input w-full min-w-0 border rounded p-2.5 text-base sm:text-sm dark:text-black box-border resize-y"
  ></textarea>
  <ng-template #singleLineInput>
    <input
      [type]="type"
      [placeholder]="placeholder"
      [formControlName]="controlName"
      [disabled]="disabled"
      class="form-input w-full min-w-0 border rounded p-2.5 text-base sm:text-sm dark:text-black box-border"
    />
  </ng-template>

  <div class="text-red-500 mt-1" *ngIf="showError">
    <span *ngIf="control.errors?.['required']"> {{ label }} is required </span>
    <span *ngIf="control.errors?.['email']"> Please enter a valid email </span>
    <span *ngIf="control.errors?.['minlength']">
      Minimum length is {{ control.errors?.['minlength'].requiredLength }}
    </span>
    <span *ngIf="control.errors?.['pakistaniPhone']">
      Enter a valid Pakistani mobile number (e.g. 03001234567 or +923001234567)
    </span>
  </div>
</div>
