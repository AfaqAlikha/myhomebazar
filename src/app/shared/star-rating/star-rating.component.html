<div class="star-rating" [class.star-rating--sm]="size === 'sm'" [class.star-rating--readonly]="readonly">
  <button
    *ngFor="let star of stars"
    type="button"
    class="star-btn"
    [class.star-btn--filled]="isStarFilled(star)"
    [disabled]="readonly || disabled"
    (click)="onStarClick($event, star)"
    [attr.aria-label]="'Rate ' + star + ' stars'"
  >
    <mat-icon>{{ getStarIcon(star) }}</mat-icon>
  </button>
  <span *ngIf="showValue" class="star-value">({{ displayValue() }})</span>
</div>
