<main class="p-4 container mx-auto max-w-4xl">
  <app-ui-card [borderRadius]="borderRadius" class="p-6 md:p-10 legal-page">
    <header class="mb-8 border-b border-[var(--color-border)] pb-6">
      <h1 class="text-3xl md:text-4xl font-bold text-[var(--color-text)] mb-2">{{ pageTitle }}</h1>
      <p class="text-sm text-[var(--color-text-secondary)]">Last updated: {{ lastUpdated }}</p>
      <p *ngIf="intro" class="mt-4 text-[var(--color-text-secondary)] leading-relaxed">{{ intro }}</p>
    </header>

    <article class="space-y-8">
      <section *ngFor="let section of sections" class="legal-section">
        <h2 class="text-xl font-semibold text-[var(--color-accent)] mb-3">{{ section.title }}</h2>
        <p
          *ngFor="let paragraph of section.paragraphs"
          class="text-[var(--color-text-secondary)] leading-relaxed mb-3"
        >
          {{ paragraph }}
        </p>
        <ul *ngIf="section.bullets?.length" class="list-disc pl-6 space-y-2 text-[var(--color-text-secondary)]">
          <li *ngFor="let item of section.bullets">{{ item }}</li>
        </ul>
      </section>
    </article>

    <footer class="mt-10 pt-6 border-t border-[var(--color-border)] text-sm text-[var(--color-text-secondary)]">
      <p>
        Questions? Contact us at
        <a href="mailto:myhomebazar.shop@gmail.com" class="text-[var(--color-accent)] hover:underline">
          myhomebazar.shop@gmail.com
        </a>
        or visit our
        <a routerLink="/contact" class="text-[var(--color-accent)] hover:underline">Contact page</a>.
      </p>
    </footer>
  </app-ui-card>
</main>
